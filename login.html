<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fromage</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#D4A373',
                        secondary: '#F4A261',
                        accent: '#E9C46A',
                        darkBg: '#0F0F0F',
                        lightBg: '#FFF8F0',
                    }
                }
            }
        }
    </script>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="icon" type="image/png" href="img/logo_primary.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="transition-colors duration-300 min-h-screen bg-lightBg dark:bg-darkBg text-current relative overflow-x-hidden py-10 flex items-start md:items-center justify-center">
    <!-- RTL & Theme Toggles -->
    <div class="fixed top-6 right-6 z-50 flex items-center space-x-4">
        <button id="rtl-toggle" class="rtl-switch glass w-10 h-10 rounded-full flex items-center justify-center hover:text-primary transition-all shadow-lg" title="Toggle RTL">
            <i class="fas fa-right-left"></i>
        </button>
        <button id="theme-toggle" class="w-10 h-10 rounded-full glass flex items-center justify-center hover:text-primary transition-all shadow-lg" title="Toggle Theme">
            <i class="fas fa-circle-half-stroke"></i>
        </button>
    </div>

    <!-- Scroll to Top -->
    <button id="scroll-to-top" class="bg-primary text-white p-3 rounded-full shadow-lg hover-lift">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Decorative Elements (Overflow Prevention Container) -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-[-10%] right-0 translate-x-1/2 w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-0 -translate-x-1/2 w-[35%] h-[35%] bg-primary/5 blur-[100px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md p-8 bg-white dark:bg-white/5 rounded-3xl shadow-2xl border border-black/5 dark:border-white/5 relative z-10" data-aos="zoom-in">
        <div class="text-center mb-6">
            <a href="index.html" class="flex items-center justify-center group mb-6">
                <img src="img/logo_primary.svg" alt="Fromage Logo" class="navbar-logo transform group-hover:scale-110 transition-transform duration-500">
                <span class="navbar-brand-name">Fromage</span>
            </a>
            <h2 class="text-2xl md:text-3xl font-serif font-bold mb-2 text-black dark:text-white">Welcome Back</h2>
            <p class="text-gray-400 italic">Please secure your place at our table.</p>
        </div>

        <form>
            <div class="mb-6">
                <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-2 ml-4">Email Address</label>
                <input type="email" required class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-full px-6 py-4 outline-none focus:border-primary transition-colors hover:bg-black/10 dark:hover:bg-white/10" placeholder="hello@example.com">
            </div>
            <div class="mb-6 relative">
                <label class="block text-xs uppercase tracking-widest font-bold text-gray-400 mb-2 ml-4">Password</label>
                <div class="relative">
                    <input type="password" id="login-password" required class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-full px-6 py-4 outline-none focus:border-primary transition-colors hover:bg-black/10 dark:hover:bg-white/10 pr-12" placeholder="••••••••">
                    <button type="button" class="password-toggle absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary transition-colors" data-target="login-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="text-right mt-2 mr-4">
                    <a href="#" class="text-[10px] uppercase tracking-widest font-bold text-gray-500 hover:text-primary transition-colors">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white py-5 rounded-full font-bold transition-all shadow-xl hover-lift uppercase tracking-[0.2em] text-xs">Sign In</button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-400">
            Don't have an account? <a href="signup.html" class="text-primary hover:underline font-bold ml-1">Sign Up</a>
        </div>

        <!-- Social Logins -->
        <div class="mt-8">
            <div class="relative flex items-center justify-center mb-8">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-xs text-gray-500 uppercase tracking-widest">Or Login With</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div class="flex justify-center space-x-4">
                <button class="w-12 h-12 rounded-full bg-black/5 dark:bg-white/10 border border-black/10 dark:border-white/20 flex items-center justify-center hover:bg-primary/20 hover:border-primary/50 transition-all group">
                    <i class="fab fa-google text-lg text-black dark:text-white group-hover:text-primary transition-colors"></i>
                </button>
                <button class="w-12 h-12 rounded-full bg-black/5 dark:bg-white/10 border border-black/10 dark:border-white/20 flex items-center justify-center hover:bg-primary/20 hover:border-primary/50 transition-all group">
                    <i class="fab fa-apple text-lg text-black dark:text-white group-hover:text-primary transition-colors"></i>
                </button>
                <button class="w-12 h-12 rounded-full bg-black/5 dark:bg-white/10 border border-black/10 dark:border-white/20 flex items-center justify-center hover:bg-primary/20 hover:border-primary/50 transition-all group">
                    <i class="fab fa-facebook-f text-lg text-black dark:text-white group-hover:text-primary transition-colors"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/script.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });

        // Password Toggle Logic
        document.querySelectorAll('.password-toggle').forEach(button => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                const icon = button.querySelector('i');

                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });
    </script>
</body>
</html>
